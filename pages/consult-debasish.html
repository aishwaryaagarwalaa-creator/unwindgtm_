<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consult with Debasish — Unwind GTM</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .consult-layout { display:grid; grid-template-columns:1fr 420px; gap:var(--space-lg); align-items:start; }
    .consult-avatar { width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,rgba(200,169,110,0.3),rgba(78,205,196,0.2));overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:2.5rem;color:var(--color-primary);margin-bottom:var(--space-sm); }
    .consult-avatar img { width:100%;height:100%;object-fit:cover; }
    .consult-name { font-family:var(--font-display);font-size:clamp(2rem,4vw,3rem);font-weight:700;letter-spacing:-0.02em;margin-bottom:0.25rem; }
    .consult-role { font-family:var(--font-mono);font-size:0.75rem;letter-spacing:0.2em;color:var(--color-primary);margin-bottom:var(--space-md); }
    .consult-bio { font-size:0.95rem;color:var(--color-text-muted);line-height:1.85;margin-bottom:var(--space-md); }
    .consult-expertise { display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:var(--space-md); }
    .booking-card { background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:8px;padding:var(--space-md);position:sticky;top:calc(var(--nav-height) + 2rem); }
    .booking-card-title { font-family:var(--font-display);font-size:1.3rem;margin-bottom:0.5rem; }
    .booking-card-sub { font-size:0.82rem;color:var(--color-text-muted);margin-bottom:var(--space-md);line-height:1.6; }
    .booking-options { display:flex;flex-direction:column;gap:0.75rem;margin-bottom:var(--space-md); }
    .booking-option { background:var(--color-bg-2);border:1px solid var(--color-border);border-radius:6px;padding:1rem;cursor:pointer;transition:all var(--transition); }
    .booking-option:hover,.booking-option.selected { border-color:rgba(200,169,110,0.5);background:rgba(200,169,110,0.05); }
    .booking-option-title { font-weight:600;font-size:0.9rem; }
    .booking-option-meta { font-size:0.75rem;color:var(--color-text-muted);margin-top:0.2rem; }
    .calendar-placeholder { background:var(--color-bg-2);border:1px dashed var(--color-border);border-radius:6px;padding:2rem;text-align:center;font-size:0.82rem;color:var(--color-text-subtle);margin-bottom:var(--space-sm);font-family:var(--font-mono);line-height:2; }
    @media (max-width:900px) { .consult-layout{grid-template-columns:1fr} .booking-card{position:static} }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="content-layer">
      <div class="section" id="pageContent">
        <p style="color:var(--color-text-muted)">Loading...</p>
      </div>
    </div>
  </div>
  <script src="../assets/js/nav.js"></script>
  <script>
    var FOUNDER_ID = 'debasish';
    fetch('../data/founders.json').then(function(r){return r.json();}).then(function(data){
      var f = data.founders.find(function(x){return x.id===FOUNDER_ID;});
      if(!f) return;
      document.title = 'Consult with '+f.name+' — Unwind GTM';
      var expertiseTags = f.expertise.map(function(e){return '<span class="tag">'+e+'</span>';}).join('');
      document.getElementById('pageContent').innerHTML =
        '<p class="hero-eyebrow">// Consultation</p>'+
        '<h1 style="font-family:var(--font-display);font-size:clamp(1.5rem,4vw,2.5rem);font-weight:700;letter-spacing:-0.02em;margin-bottom:var(--space-md)">Book a call with <em style="font-style:normal;color:var(--color-primary)">'+f.name+'</em></h1>'+
        '<div class="consult-layout">'+
          '<div class="consult-left">'+
            '<div class="consult-avatar"><img src="../'+f.image+'" alt="'+f.name+'" onerror="this.parentElement.textContent=\''+f.name[0]+'\'"></div>'+
            '<div class="consult-name">'+f.name+'</div>'+
            '<div class="consult-role">'+f.role+' · Unwind GTM</div>'+
            '<p class="consult-bio">'+f.bio+'</p>'+
            '<div class="consult-expertise">'+expertiseTags+'</div>'+
            '<a href="about.html" class="btn btn-ghost">Full Profile →</a>'+
          '</div>'+
          '<div class="booking-card">'+
            '<div class="booking-card-title">Schedule a Call</div>'+
            '<p class="booking-card-sub">Choose the type of consultation that fits where you are and what you need.</p>'+
            '<div class="booking-options">'+
              '<div class="booking-option selected"><div class="booking-option-title">GTM Audit Call</div><div class="booking-option-meta">30 min · Free · Video call</div></div>'+
              '<div class="booking-option"><div class="booking-option-title">Strategy Deep-Dive</div><div class="booking-option-meta">60 min · Paid · Includes written summary</div></div>'+
            '</div>'+
            '<!-- CALENDAR EMBED: Replace the block below with your Calendly/Cal.com embed code -->'+
            '<div class="calendar-placeholder">'+
              '📅 Calendar embed goes here<br>'+
              'Replace this in pages/consult-'+f.id+'.html<br>'+
              'with your Calendly or Cal.com embed code'+
            '</div>'+
            '<p style="font-size:0.72rem;color:var(--color-text-subtle);text-align:center;font-family:var(--font-mono)">Or email directly to schedule</p>'+
          '</div>'+
        '</div>';
      document.querySelectorAll('.booking-option').forEach(function(opt){
        opt.addEventListener('click',function(){
          document.querySelectorAll('.booking-option').forEach(function(o){o.classList.remove('selected');});
          opt.classList.add('selected');
        });
      });
    });
  </script>
</body>
</html>
